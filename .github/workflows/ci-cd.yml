name: DevSecOps CI/CD Security Sprint

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-scan:
    name: Build, Scan and Test
    runs-on: ubuntu-latest
    
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Application
      run: npm run build

    # Phase 4: Automated Security Testing (SAST)
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript'

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    # DAST (OWASP ZAP Scans) - Industry Standard Implementation
    - name: ZAP Scan (DAST)
      uses: zaproxy/action-baseline@v0.12.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target: 'https://your-staging-site-url.com'
        rules_file_name: '.zap/rules.tsv'
        fail_action: true # Pipeline must fail if critical vulnerability is detected as per CDF Unit 6
    
    - name: Security Test Summary
      if: always()
      run: |
        echo "Security Scanning Completed Successfully"
        echo "SAST Tools: CodeQL"
        echo "DAST Tools: OWASP ZAP"
